<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Opportunity Research Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #F6F7F8 0%, #E8EEF5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { max-width: 450px; width: 90%; margin: 40px auto; }
        .card {
            background: white;
            border-radius: 32px;
            padding: 48px;
            border: 1px solid rgba(47,93,140,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 24px; color: #2F5D8C; }
        h2 { font-size: 28px; margin-bottom: 24px; text-align: center; color: #1F2933; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: #4B5563; }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #E2E8F0;
            border-radius: 14px;
            font-size: 16px;
            background: #F9FAFC;
        }
        .form-group input:focus {
            border-color: #2F5D8C;
            outline: none;
            box-shadow: 0 0 0 3px rgba(47,93,140,0.1);
        }
        .btn {
            background: #2F5D8C;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        .error { background: #FEE2E2; color: #991B1B; }
        .success { background: #D1FAE5; color: #065F46; }
        .footer { text-align: center; margin-top: 24px; font-size: 13px; color: #6B7280; }
        .footer a { color: #2F5D8C; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>Opportunity Research Platform</h1>
            </div>
            <h2>Reset Password</h2>
            <div id="message" class="message"></div>
            <form id="resetForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <button type="submit" class="btn">Send Reset Link</button>
            </form>
            <div class="footer">
                <p><a href="deal-pipeline.html">← Back to Login</a></p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const messageDiv = document.getElementById('message');
            
            messageDiv.style.display = 'none';
            
            if (!email) {
                messageDiv.textContent = 'Please enter your email address';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/member-auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.textContent = 'Password reset link sent! Check your email.';
                    messageDiv.className = 'message success';
                    messageDiv.style.display = 'block';
                    document.getElementById('resetForm').reset();
                } else {
                    messageDiv.textContent = data.error || 'Email not found';
                    messageDiv.className = 'message error';
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                messageDiv.textContent = 'Cannot connect to server. Please try again.';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
