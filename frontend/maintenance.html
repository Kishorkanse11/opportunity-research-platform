<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance | Opportunity Research Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .maintenance-container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 16px;
        }
        p {
            color: #94a3b8;
            margin-bottom: 32px;
            font-size: 18px;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #334155;
            border-radius: 2px;
            overflow: hidden;
            margin: 32px 0;
        }
        .progress-fill {
            width: 60%;
            height: 100%;
            background: #f59e0b;
            border-radius: 2px;
            animation: progress 2s ease-in-out infinite;
        }
        @keyframes progress {
            0% { width: 30%; }
            50% { width: 70%; }
            100% { width: 30%; }
        }
        .email-input {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }
        input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid #334155;
            border-radius: 12px;
            background: #0f172a;
            color: white;
        }
        button {
            background: #f59e0b;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        footer {
            margin-top: 48px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="icon">🔧</div>
        <h1>The site is stopped by developer </h1>
        <p>Due to incomplete payment of website development service.</p>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <p style="font-size: 14px;">Estimated completion: <strong>~30 minutes</strong></p>
        <div class="email-input">
            <input type="email" placeholder="Enter your email for updates">
            <button onclick="alert('You will be notified when site is back')">Notify Me</button>
        </div>
        <footer>
            <p>Opportunity Research Platform | Property & Business Research Since 1970</p>
        </footer>
    </div>
</body>
</html>
