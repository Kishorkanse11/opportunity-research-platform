<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Payment Receipt</title>
</head>
<body>
    <h2>Payment Receipt</h2>
    <p>Dear {{memberName}},</p>
    <p>Thank you for your payment of ${{amount}}.</p>
    <p>Transaction ID: {{transactionId}}</p>
    <p>Date: {{paymentDate}}</p>
    <p>Your membership is valid until: {{renewalDate}}</p>
</body>
</html>
